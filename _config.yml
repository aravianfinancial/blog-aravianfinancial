url: "https://blog.aravianfinancial.com"
baseurl: ""

author:
  name: "Kris Syevens"
  title: "CEO & Mortgage Advisor"
  nmls: "566937"
  company: "Aravian Financial LLC"
  company_nmls: "2691016"
  email: "kris@aravianfinancial.com"
  phone: "281-716-3215"

main_site: "https://aravianfinancial.com"
